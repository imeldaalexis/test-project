<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapoer Inge Order App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Memastikan class hidden berfungsi jika belum ada di styles.css */
        .hidden { display: none !important; }
        .flex-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .custom-menu-btn { background-color: #f0f0f0; border: 1px solid #ccc; padding: 5px 10px; cursor: pointer; border-radius: 4px;}
    </style>
</head>
<body>
    <main class="app-container">
        <header>
            <h1>Dapoer Inge Order App</h1>
        </header>

        <button type="button" class="refresh-btn" onclick="window.location.reload()">Refresh</button>

        <section class="card">
            <h2>Today's Order</h2>
            <div class="table-container">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th onclick="sortTable('name')">Name ↕</th>
                            <th onclick="sortTable('location')">Location ↕</th>
                            <th onclick="sortTable('order_details')">Order ↕</th>
                            <th onclick="sortTable('batch_time')">Time ↕</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body">
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h2>Order Here</h2>
            <form id="order-form">
                <div class="form-group">
                    <label for="customer-name">Name</label>
                    <input type="text" id="customer-name" required placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="batch-time">Batch Time</label>
                    <select id="batch-time" required>
                        <option value="" disabled selected>Select time...</option>
                        <option value="Jam 1">Jam 1</option>
                        <option value="Jam 2.30">Jam 2.30</option>
                        <option value="Jam 7">Jam 7</option>
                        <option value="Jam 8.30">Jam 8.30</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <select id="location" required onchange="toggleOtherLocation()">
                        <option value="" disabled selected>Select location...</option>
                        <option value="Asrama A">Asrama A</option>
                        <option value="Asrama B">Asrama B</option>
                        <option value="Asrama C">Asrama C</option>
                        <option value="Asrama D">Asrama D</option>
                        <option value="Asrama E">Asrama E</option>
                        <option value="Asrama F">Asrama F</option>
                        <option value="Asrama G">Asrama G</option>
                        <option value="Asrama H">Asrama H</option>
                        <option value="Asrama I">Asrama I</option>
                        <option value="Asrama J">Asrama J</option>
                        <option value="Asrama K">Asrama K</option>
                        <option value="Asrama L">Asrama L</option>
                        <option value="Asrama M">Asrama M</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <div class="form-group hidden" id="other-location-group">
                    <label for="other-location">Specify Location</label>
                    <input type="text" id="other-location" placeholder="Enter your address">
                </div>
            </form>
        </section>

        <section class="card">
            <div class="flex-row">
                <h2>Menu</h2>
            </div>
            
            <input type="text" id="menu-search" placeholder="Search menu..." onkeyup="filterMenu()" style="margin-bottom: 15px; width: 100%;">
            
            <div id="menu-list" class="menu-list">
                </div>

            <div class="custom-menu-section" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                <button type="button" class="submit-btn" onclick="toggleCustomMenu()">+ Add Custom Menu (Non DB)</button>
                
                <div id="custom-menu-group" class="hidden" style="margin-top: 10px;">
                    <div class="form-group">
                        <label for="custom-menu-name">Custom Menu Name</label>
                        <input type="text" id="custom-menu-name" placeholder="Enter custom menu name...">
                    </div>
                    <div class="quantity-controls" style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                        <span>Quantity:</span>
                        <button type="button" class="qty-btn" onclick="updateCustomQty(-1)">-</button>
                        <span id="custom-qty-display">0</span>
                        <button type="button" class="qty-btn" onclick="updateCustomQty(1)">+</button>
                    </div>
                </div>
            </div>
        </section>

        <button class="submit-btn" onclick="submitOrder()">Submit Order</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
